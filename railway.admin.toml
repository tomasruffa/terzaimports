# Servicio Railway: panel admin (Next.js)
#
# En Railway → servicio admin → Settings:
#   Root Directory: vacío (raíz del repo, NO apps/admin)
#   Config file: railway.admin.toml
#   (El Dockerfile path se toma de este archivo.)

[build]
builder = "dockerfile"
dockerfilePath = "apps/admin/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
