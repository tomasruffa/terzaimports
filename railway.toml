# SOLO para el servicio API (no usar para admin).
# API: Root Directory = apps/api → usa apps/api/railway.toml + Dockerfile
# Admin: Root Directory vacío → Config file = railway.admin.toml (ver README)

[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
