# Fallback si el servicio NO tiene Root Directory = apps/api
# Recomendado: Root Directory = apps/api (usa apps/api/railway.toml + Dockerfile)

[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
